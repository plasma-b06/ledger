{% extends "base.html" %}

{% block title %}Login - Ledger{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-lg-10 col-xl-9">
            <div class="card shadow-lg overflow-hidden">
                <div class="row g-0">
                    
                    <!-- Left Side - Form -->
                    <div class="col-md-6 p-5">
                        <div class="mb-5">
                            <h2 class="fw-bold text-primary">Welcome Back</h2>
                            <p class="text-muted">Sign in to manage your expenses</p>
                        </div>

                        <form method="POST" action="/login">
                            <div class="mb-4">
                                <label class="form-label fw-bold">Username / Unique Key</label>
                                <input type="text" 
                                       name="name" 
                                       class="form-control form-control-lg" 
                                       placeholder="Enter username or uniquekey"
                                       required autofocus>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" 
                                       name="password"
                                       class="form-control form-control-lg" 
                                       placeholder="Enter password"
                                       required>
                            </div>

                            {% if error %}
                                <div class="alert alert-danger">{{ error }}</div>
                            {% endif %}

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Login
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-2">
                                <a href="#" class="text-muted">Forgot Password?</a>
                            </p>
                            <p>
                                Don't have an account? 
                                <a href="/register" class="text-primary fw-bold">Register here</a>
                            </p>
                        </div>
                    </div>

                    <!-- Right Side - Image -->
                    <div class="col-md-6 d-none d-md-block p-0">
                        <img src="{{ url_for('static', filename='images/login-image.jpg') }}" 
                             alt="Login Image" 
                             class="img-fluid h-100 w-100"
                             style="object-fit: cover;">
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
