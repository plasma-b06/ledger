{% extends 'base.html' %}

{% block title %}Add Transaction{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Add New Transaction</h4>
                </div>
                
                <div class="card-body">
                    <form method="POST" action="/add-transaction">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Select Page</label>
                            <select class="form-select" name="page_id" required>
                                <option value="">-- Choose Page --</option>
                                {% for p in pages %}
                                <option value="{{ p.page_id }}">{{ p.name }} ({{ p.currency }})</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <input type="text" 
                                   class="form-control" 
                                   name="description" 
                                   placeholder="e.g. Dinner at Beach, Train Tickets" 
                                   required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Amount</label>
                                <input type="number" 
                                       step="0.01" 
                                       class="form-control" 
                                       name="amount" 
                                       placeholder="0.00" 
                                       required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Date</label>
                                <input type="date" 
                                       class="form-control" 
                                       name="transaction_date" 
                                       value="{{ today }}" 
                                       required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Paid By</label>
                            <select class="form-select" name="paid_by" required>
                                {% for user in participants %}
                                <option value="{{ user.user_id }}" 
                                        {% if user.user_id == current_user_id %}selected{% endif %}>
                                    {{ user.name }} {% if user.user_id == current_user_id %}(You){% endif %}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <h5 class="mt-4 mb-3">Split Among Participants</h5>
                        <div class="mb-3 form-check">
                            <input class="form-check-input" type="radio" name="split_type" id="equal" value="equal" checked>
                            <label class="form-check-label" for="equal">Split Equally</label>
                        </div>
                        <div class="mb-4 form-check">
                            <input class="form-check-input" type="radio" name="split_type" id="custom" value="custom">
                            <label class="form-check-label" for="custom">Custom Split</label>
                        </div>

                        <!-- Participants List -->
                        <div id="participants-list">
                            {% for user in participants %}
                            <div class="row mb-2 align-items-center">
                                <div class="col-6">
                                    <strong>{{ user.name }}</strong>
                                    {% if user.user_id == current_user_id %}<span class="badge bg-primary">You</span>{% endif %}
                                </div>
                                <div class="col-6">
                                    <input type="number" 
                                           step="0.01" 
                                           class="form-control share-input"
                                           name="share_{{ user.user_id }}"
                                           placeholder="0.00">
                                </div>
                            </div>
                            {% endfor %}
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success btn-lg">Add Transaction</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="/page/{{ page_id|default('') }}" class="text-decoration-none">← Back to Page</a>
            </div>
        </div>
    </div>
</div>

<script>
    // Simple JS to enable/disable custom shares
    document.querySelectorAll('input[name="split_type"]').forEach(radio => {
        radio.addEventListener('change', function() {
            document.querySelectorAll('.share-input').forEach(input => {
                input.disabled = this.value === 'equal';
            });
        });
    });
</script>
{% endblock %}
