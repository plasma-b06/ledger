{% extends "base.html" %}

{% block title %}Register - Ledger{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-lg-10 col-xl-9">
            <div class="card shadow-lg overflow-hidden">
                <div class="row g-0">

                    <!-- Left Side - Form -->
                    <div class="col-md-6 p-5">
                        <div class="mb-4">
                            <h2 class="fw-bold text-success">Create Account</h2>
                            <p class="text-muted">Join Ledger to manage expenses easily</p>
                        </div>

                        <form method="POST" action="/register">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <input type="text" 
                                       name="name" 
                                       class="form-control form-control-lg" 
                                       placeholder="Enter your name"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Unique Key (Username/ID)</label>
                                <input type="text" 
                                       name="uniquekey" 
                                       class="form-control form-control-lg" 
                                       placeholder="e.g. SHR123 or kaustubh07"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" 
                                       name="password" 
                                       class="form-control form-control-lg" 
                                       placeholder="Create password"
                                       required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Confirm Password</label>
                                <input type="password" 
                                       name="confirmation" 
                                       class="form-control form-control-lg" 
                                       placeholder="Confirm password"
                                       required>
                            </div>

                            {% if error %}
                                <div class="alert alert-danger">{{ error }}</div>
                            {% endif %}

                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg">
                                    Register
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <p>Already have an account? 
                                <a href="/login" class="text-primary fw-bold">Login here</a>
                            </p>
                        </div>
                    </div>

                    <!-- Right Side - Image -->
                    <div class="col-md-6 d-none d-md-block p-0">
                        <img src="{{ url_for('static', filename='images/login-image.jpg') }}" 
                             alt="Register" 
                             class="img-fluid h-100 w-100"
                             style="object-fit: cover;">
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
